<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pink Garden</title>
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
  <style>
    *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }

    :root {
      --dark-color: #0a0612;
      --pink:       #ff6eb4;
      --pink-soft:  #ffb3d9;
      --pink-deep:  #e0447e;
      --pink-glow:  #ff80c0;
      --stem:       #1a5c2a;
      --stem-light: #2d8a40;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #1a0828 0%, var(--dark-color) 60%);
      overflow: hidden;
      perspective: 1000px;
      padding: 50px 0;
    }

    /* ── STARS ── */
    .stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star-p {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkleP var(--dur) var(--del) ease-in-out infinite alternate;
    }
    @keyframes twinkleP { 0%{opacity:0.1} 100%{opacity:0.85} }

    /* ── MOON ── */
    .moon-p {
      position: fixed;
      top: clamp(20px,4vh,50px); right: clamp(16px,5vw,80px);
      z-index: 1;
      width: clamp(36px,5vw,60px); height: clamp(36px,5vw,60px);
      background: radial-gradient(circle at 35% 40%, #fff8e7, #ffd97d 60%, #ffb347);
      border-radius: 50%;
      box-shadow: 0 0 35px rgba(255,217,125,0.35);
      animation: moonPFloat 8s ease-in-out infinite;
    }
    @keyframes moonPFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    /* ── NAV ── */
    .back-btn {
      position: fixed; top: clamp(10px,2vh,16px); left: 50%; transform: translateX(-50%);
      z-index: 100;
      text-decoration: none;
      color: rgba(255,179,217,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid rgba(255,110,180,0.2);
      padding: clamp(6px,1vh,8px) clamp(14px,3vw,22px);
      border-radius: 50px;
      backdrop-filter: blur(8px);
      background: rgba(10,6,18,0.6);
      transition: all 0.3s;
      font-family: 'Sacramento', cursive;
      font-size: clamp(13px,2vw,16px);
      white-space: nowrap;
    }
    .back-btn:hover { color: #ffb3d9; border-color: rgba(255,110,180,0.5); }

    .garden-title {
      position: fixed; top: clamp(40px,7vh,60px); left: 50%; transform: translateX(-50%);
      z-index: 5;
      font-family: 'Sacramento', cursive;
      font-size: clamp(22px,5vw,42px);
      color: rgba(255,179,217,0.7);
      text-shadow: 0 0 30px rgba(255,110,180,0.4);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── GROUND GLOW ── */
    .ground-glow {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 60vw; height: 12vw;
      background: rgba(255,110,180,0.12);
      filter: blur(6vw);
      border-radius: 50%;
      z-index: 5;
      pointer-events: none;
    }

    /* ════════════════════════════════════════════
       CSS-DIV FLOWER SYSTEM (from index.html style)
    ════════════════════════════════════════════ */

    .night {
      position: fixed; left: 50%; top: 0;
      transform: translateX(-50%);
      width: 100%; height: 100%;
      filter: blur(0.1vmin);
    }

    .flowers {
      position: relative;
      transform: scale(0.9);
      z-index: 10;
    }

    /* ── FLOWER BASE ── */
    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: 0.8s;
    }

    .flower--1 { animation: moving-flower-1 4s linear infinite; }
    .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
    .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
    .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 1.2s backwards; }
    .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.0s backwards; }
    .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left  var(--fl-speed) 2.0s backwards; }

    .flower--2 {
      left: 50%;
      transform: rotate(20deg);
      animation: moving-flower-2 4s linear infinite;
    }
    .flower--2 .flower__line { height: 60vmin; animation-delay: 0.6s; }
    .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
    .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
    .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 1.5s backwards; }
    .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.3s backwards; }

    .flower--3 {
      left: 50%;
      transform: rotate(-15deg);
      animation: moving-flower-3 4s linear infinite;
    }
    .flower--3 .flower__line { animation-delay: 0.9s; }
    .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
    .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
    .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 2.1s backwards; }
    .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.9s backwards; }

    /* ── PETALS — PINK ── */
    .flower__leafs {
      position: relative;
      animation: blooming-flower 2s backwards;
    }
    .flower__leafs--1 { animation-delay: 1.1s; }
    .flower__leafs--2 { animation-delay: 1.4s; }
    .flower__leafs--3 { animation-delay: 1.7s; }

    .flower__leafs::after {
      content: "";
      position: absolute; left: 0; top: 0;
      transform: translate(-50%, -100%);
      width: 8vmin; height: 8vmin;
      background-color: var(--pink-glow);
      filter: blur(10vmin);
    }

    .flower__leaf {
      position: absolute;
      bottom: 0; left: 50%;
      width: 8vmin; height: 11vmin;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background-color: var(--pink-soft);
      background-image: linear-gradient(to top, var(--pink-deep), var(--pink-soft));
      transform-origin: bottom center;
      opacity: 0.9;
      box-shadow: inset 0 0 2vmin rgba(255,255,255,0.5);
    }
    .flower__leaf--1 { transform: translate(-10%,  1%) rotateY(40deg)  rotateX(-50deg); }
    .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
    .flower__leaf--3 { transform: translate(-90%,  0%) rotateY(45deg)  rotateX(50deg); }
    .flower__leaf--4 {
      width: 8vmin; height: 8vmin;
      transform-origin: bottom left;
      border-radius: 4vmin 10vmin 4vmin 4vmin;
      transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg);
      background-image: linear-gradient(to top, #c0397a, var(--pink-soft));
      z-index: 1; opacity: 0.8;
    }

    /* ── FLOWER CENTER ── */
    .flower__white-circle {
      position: absolute;
      left: -3.5vmin; top: -3vmin;
      width: 9vmin; height: 4vmin;
      border-radius: 50%;
      background-color: #fff;
    }
    .flower__white-circle::after {
      content: "";
      position: absolute; left: 50%; top: 45%;
      transform: translate(-50%, -50%);
      width: 60%; height: 60%;
      border-radius: inherit;
      background-image: linear-gradient(90deg, #ffe0f0, #ffd97d);
    }

    /* ── GLOW PARTICLES ── */
    .flower__light {
      position: absolute; bottom: 0; left: 50%;
      width: 1vmin; height: 1vmin;
      background-color: var(--pink-glow);
      border-radius: 50%;
      animation: light-ans 4s linear infinite backwards;
    }
    .flower__light--1 { animation-delay: 0.5s; margin-left:  2vmin; }
    .flower__light--2 { animation-delay: 1.0s; margin-left: -2vmin; }
    .flower__light--3 { animation-delay: 1.5s; margin-left:  4vmin; }
    .flower__light--4 { animation-delay: 2.0s; margin-left: -4vmin; }
    .flower__light--5 { animation-delay: 2.5s; margin-left:  1vmin; }
    .flower__light--6 { animation-delay: 3.0s; margin-left: -1vmin; }
    .flower__light--7 { animation-delay: 3.5s; margin-left:  3vmin; }
    .flower__light--8 { animation-delay: 4.0s; margin-left: -3vmin; }

    /* ── STEM ── */
    .flower__line {
      height: 55vmin;
      width: 1.5vmin;
      background-image:
        linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)),
        linear-gradient(to top, transparent 10%, var(--stem), var(--stem-light));
      box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
      animation: grow-flower-tree 4s backwards;
    }
    .flower__line__leaf {
      --w: 7vmin;
      --h: calc(var(--w) + 2vmin);
      position: absolute;
      top: 20%; left: 90%;
      width: var(--w); height: var(--h);
      border-top-right-radius: var(--h);
      border-bottom-left-radius: var(--h);
      background-image: linear-gradient(to top, rgba(26,92,42,0.4), var(--stem-light));
    }
    .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3,
    .flower__line__leaf--4,
    .flower__line__leaf--6 {
      border-top-right-radius: 0; border-bottom-left-radius: 0;
      border-top-left-radius: var(--h); border-bottom-right-radius: var(--h);
      left: -460%; top: 12%;
      transform: rotate(-70deg) rotateY(30deg);
    }
    .flower__line__leaf--4 { top: 40%; }
    .flower__line__leaf--5 { top: 60%; transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--6 { top: 55%; }

    /* ── GRASS ── */
    .flower__grass {
      position: absolute;
      bottom: 20vmin; left: -10vmin;
    }
    .flower__grass--top {
      width: 2vmin; height: 15vmin;
      background-image: linear-gradient(to top, var(--stem), var(--stem-light));
      border-radius: 1vmin;
    }
    .flower__grass--bottom {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 5vmin;
      background-color: var(--stem);
    }
    .flower__grass__leaf {
      position: absolute; bottom: 12vmin;
      width: 4vmin; height: 8vmin;
      background-image: linear-gradient(to top, var(--stem), var(--stem-light));
      border-radius: 4vmin 4vmin 0 0;
    }
    .flower__grass__leaf--1 { left: -3vmin; transform: rotate(-30deg); }
    .flower__grass__leaf--2 { left:  1vmin; transform: rotate( 15deg); }
    .flower__grass__leaf--3 { left: -2vmin; bottom: 9vmin; transform: rotate(-15deg); }
    .flower__grass__leaf--4 { left:  2vmin; bottom: 9vmin; transform: rotate( 30deg); }
    .flower__grass__leaf--5 { left: -4vmin; bottom: 6vmin; transform: rotate(-45deg); }
    .flower__grass__leaf--6 { left:  3vmin; bottom: 6vmin; transform: rotate( 45deg); }
    .flower__grass__leaf--7 { left: -1vmin; bottom: 3vmin; transform: rotate(-20deg); }
    .flower__grass__leaf--8 { left:  1vmin; bottom: 3vmin; transform: rotate( 20deg); }
    .flower__grass__overlay {
      position: absolute; bottom: 0; left: -3vmin;
      width: 8vmin; height: 6vmin;
      background-color: var(--dark-color);
    }
    .flower__grass--1 { animation: moving-grass    4s linear infinite; }
    .flower__grass--2 { left: 4vmin; animation: moving-grass--2 4s linear infinite;
                        transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); }

    /* ── LONG GRASS ── */
    .flower__g-long { position: absolute; bottom: 15vmin; left: -5vmin; }
    .flower__g-long__top {
      width: 1.5vmin; height: 30vmin;
      background-image: linear-gradient(to top, var(--stem), var(--stem-light));
      border-radius: 1vmin;
    }
    .flower__g-long__bottom {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 3vmin;
      background-color: var(--stem);
    }

    /* ── G-RIGHT LEAVES ── */
    .flower__g-right { position: absolute; bottom: 22vmin; }
    .flower__g-right--1 { left: 18vmin; transform: rotate(-20deg); }
    .flower__g-right--2 { left: -18vmin; transform: rotate(20deg) rotateY(180deg); }
    .flower__g-right .leaf {
      --w: 15vmin; --h: 30vmin; --c: #1aaa15;
      width: var(--w); height: var(--h);
      border-top-left-radius: 100%;
      border-left: 2vmin solid var(--c);
      -webkit-mask-image: linear-gradient(to top, transparent 20%, var(--dark-color));
    }

    /* ── G-FRONT ── */
    .flower__g-front { position: absolute; bottom: 0; left: -10vmin; width: 20vmin; }
    .flower__g-front__line {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 1.5vmin; height: 25vmin;
      background-image: linear-gradient(to top, var(--stem), var(--stem-light));
    }
    .flower__g-front__leaf-wrapper {
      position: absolute; bottom: 0; left: 50%;
      transform-origin: bottom center;
    }
    .flower__g-front__leaf {
      width: 5vmin; height: 10vmin;
      background-image: linear-gradient(to top, var(--stem), #6db33f);
      border-radius: 5vmin 5vmin 0 0;
    }
    .flower__g-front__leaf-wrapper--1 { transform: rotate(-80deg); bottom:  5vmin; }
    .flower__g-front__leaf-wrapper--2 { transform: rotate(-60deg); bottom:  9vmin; }
    .flower__g-front__leaf-wrapper--3 { transform: rotate(-40deg); bottom: 13vmin; }
    .flower__g-front__leaf-wrapper--4 { transform: rotate(-20deg); bottom: 17vmin; }
    .flower__g-front__leaf-wrapper--5 { transform: rotate( 20deg); bottom: 17vmin; }
    .flower__g-front__leaf-wrapper--6 { transform: rotate( 40deg); bottom: 13vmin; }
    .flower__g-front__leaf-wrapper--7 { transform: rotate( 60deg); bottom:  9vmin; }
    .flower__g-front__leaf-wrapper--8 { transform: rotate( 80deg); bottom:  5vmin; }

    /* ── G-FR ── */
    .flower__g-fr { position: absolute; bottom: 0; left: 5vmin; }
    .flower__g-fr .leaf {
      --w: 8vmin; --h: 25vmin; --c: #1aaa15;
      width: var(--w); height: var(--h);
      border-top-left-radius: 100%;
      border-left: 2vmin solid var(--c);
      -webkit-mask-image: linear-gradient(to top, transparent 20%, var(--dark-color));
    }
    .flower__g-fr__leaf {
      position: absolute;
      width: 6vmin; height: 10vmin;
      background-image: linear-gradient(to top, var(--stem), #6db33f);
      border-radius: 5vmin 5vmin 0 0;
    }
    .flower__g-fr__leaf--1 { left: 3vmin;  top:  0vmin; transform: rotate( 20deg); animation: fr-ans-1 0.5s 3.4s linear backwards; }
    .flower__g-fr__leaf--2 { left:-3vmin;  top:  2vmin; transform: rotate(-25deg) rotateY(-180deg); animation: fr-ans-2 0.5s 3.6s linear backwards; }
    .flower__g-fr__leaf--3 { left: 4vmin;  top:  6vmin; transform: rotate( 35deg); animation: fr-ans-3 0.5s 3.8s linear backwards; }
    .flower__g-fr__leaf--4 { left:-2vmin;  top: -2vmin; transform: rotate( 25deg) rotateY(-180deg); animation: fr-ans-4 0.5s 4.0s linear backwards; }
    .flower__g-fr__leaf--5 { left:10vmin;  top: 14vmin; transform: rotate( 55deg); animation: fr-ans-5 0.5s 4.4s linear backwards; }
    .flower__g-fr__leaf--6 { left: 0vmin;  top:  6vmin; transform: rotate( 25deg) rotateY(-180deg); animation: fr-ans-6 0.5s 4.2s linear backwards; }
    .flower__g-fr__leaf--7 { left: 5vmin;  top: 22vmin; transform: rotate( 45deg); animation: fr-ans-7 0.5s 4.0s linear backwards; }
    .flower__g-fr__leaf--8 { left:-4vmin;  top: 15vmin; transform: rotate( 15deg) rotateY(-180deg); animation: fr-ans-8 0.5s 3.8s linear backwards; }

    @keyframes fr-ans-1 { 0%{transform-origin:left;  transform:rotate( 20deg) scale(0);} }
    @keyframes fr-ans-2 { 0%{transform-origin:right; transform:rotate(-25deg) rotateY(-180deg) scale(0);} }
    @keyframes fr-ans-3 { 0%{transform-origin:left;  transform:rotate( 35deg) scale(0);} }
    @keyframes fr-ans-4 { 0%{transform-origin:right; transform:rotate( 25deg) rotateY(-180deg) scale(0);} }
    @keyframes fr-ans-5 { 0%{transform-origin:left;  transform:rotate( 55deg) scale(0);} }
    @keyframes fr-ans-6 { 0%{transform-origin:right; transform:rotate( 25deg) rotateY(-180deg) scale(0);} }
    @keyframes fr-ans-7 { 0%{transform-origin:left;  transform:rotate( 45deg) scale(0);} }
    @keyframes fr-ans-8 { 0%{transform-origin:right; transform:rotate( 15deg) rotateY(-180deg) scale(0);} }

    /* ── LONG-G BLADES ── */
    .long-g {
      position: absolute;
      bottom: 25vmin; left: -42vmin;
      transform-origin: bottom left;
    }
    .long-g--1 { bottom: 0vmin;  transform: scale(0.8) rotate(-5deg); }
    .long-g--2,
    .long-g--3 { bottom: -3vmin; left: -35vmin; transform-origin: center; transform: scale(0.6) rotateX(60deg); }
    .long-g--3  { left: -17vmin; bottom: 0vmin; }
    .long-g--4  { left:  25vmin; bottom: -3vmin; transform-origin: center; transform: scale(0.6) rotateX(60deg); }
    .long-g--5  { left:  42vmin; bottom:  0vmin; transform: scale(0.8) rotate(2deg); }
    .long-g--6  { left:   0vmin; bottom: -20vmin; z-index: 100; filter: blur(0.3vmin); transform: scale(0.8) rotate(2deg); }
    .long-g--7  { left:  35vmin; bottom:  20vmin; z-index: -1;  filter: blur(0.3vmin); transform: scale(0.6) rotate(2deg); opacity: 0.7; }

    .long-g .leaf {
      --w: 15vmin; --h: 40vmin; --c: #1aaa15;
      position: absolute; bottom: 0;
      width: var(--w); height: var(--h);
      border-top-left-radius: 100%;
      border-left: 2vmin solid var(--c);
      -webkit-mask-image: linear-gradient(to top, transparent 20%, var(--dark-color));
      transform-origin: bottom center;
    }
    .long-g .leaf--0 { left:  2vmin; animation: leaf-ans-1 4s linear infinite; }
    .long-g .leaf--1 { --w: 5vmin; --h: 60vmin; animation: leaf-ans-1 4s linear infinite; }
    .long-g .leaf--2 { --w:10vmin; --h: 40vmin; left:-0.5vmin; bottom:5vmin; transform-origin:bottom left; transform:rotateY(-180deg); animation: leaf-ans-2 3s linear infinite; }
    .long-g .leaf--3 { --w: 5vmin; --h: 30vmin; left:  -1vmin; bottom:3.2vmin; transform-origin:bottom left; transform:rotate(-10deg) rotateY(-180deg); animation: leaf-ans-3 3s linear infinite; }

    .long-g--1 .leaf { -webkit-mask-image: linear-gradient(to top, transparent 40%, #079097 80%) !important; }
    .long-g--1 .leaf--1 { --w:5vmin; --h:60vmin; left:-2vmin; transform:rotate(3deg) rotateY(-180deg); }
    .long-g--2 .leaf, .long-g--3 .leaf { -webkit-mask-image: linear-gradient(to top, transparent 50%, #079097 80%) !important; }
    .long-g--2 .leaf--1, .long-g--3 .leaf--1 { left:-1vmin; transform:rotateY(-180deg); }
    .long-g--3 .leaf { -webkit-mask-image: linear-gradient(to top, transparent 40%, #079097 80%) !important; }
    .long-g--4 .leaf { -webkit-mask-image: linear-gradient(to top, transparent 50%, #079097 80%) !important; }

    /* ── GROW WRAPPERS ── */
    .grow-ans    { animation: grow-ans          2s var(--d) backwards; }
    .growing-grass { animation: growing-grass-ans 1s 2s       backwards; }

    /* ════════════════════════════════════
       KEYFRAMES
    ════════════════════════════════════ */
    @keyframes grow-ans           { 0%{transform:scale(0); opacity:0;} }
    @keyframes growing-grass-ans  { 0%{transform:scale(0);} }

    @keyframes light-ans {
      0%  { opacity:0; transform:translateY(0); }
      25% { opacity:1; transform:translateY(-5vmin)  translateX(-2vmin); }
      50% { opacity:1; transform:translateY(-15vmin) translateX(2vmin);  filter:blur(0.2vmin); }
      75% {            transform:translateY(-20vmin) translateX(-2vmin); filter:blur(0.2vmin); }
      100%{ opacity:0; transform:translateY(-30vmin); filter:blur(1vmin); }
    }

    @keyframes moving-flower-1 { 0%,100%{transform:rotate(2deg)}  50%{transform:rotate(-2deg)} }
    @keyframes moving-flower-2 { 0%,100%{transform:rotate(18deg)} 50%{transform:rotate(14deg)} }
    @keyframes moving-flower-3 { 0%,100%{transform:rotate(-18deg)} 50%{transform:rotate(-20deg) rotateY(-10deg)} }

    @keyframes blooming-leaf-right { 0%{transform-origin:left;  transform:rotate(70deg)  rotateY(30deg) scale(0);} }
    @keyframes blooming-leaf-left  { 0%{transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(0);} }
    @keyframes grow-flower-tree    { 0%{height:0; border-radius:1vmin;} }
    @keyframes blooming-flower     { 0%{transform:scale(0);} }

    @keyframes moving-grass   { 0%,100%{transform:rotate(-48deg) rotateY(40deg);} 50%{transform:rotate(-50deg) rotateY(40deg);} }
    @keyframes moving-grass--2{ 0%,100%{transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);} 50%{transform:scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg);} }

    @keyframes leaf-ans-1 { 0%,100%{transform:rotate(-5deg) scale(1);}  50%{transform:rotate(5deg) scale(1.1);} }
    @keyframes leaf-ans-2 { 0%,100%{transform:rotateY(-180deg) rotate(5deg);}  50%{transform:rotateY(-180deg) rotate(0deg) scale(1.1);} }
    @keyframes leaf-ans-3 { 0%,100%{transform:rotate(-10deg) rotateY(-180deg);} 50%{transform:rotate(-20deg) rotateY(-180deg);} }

    .not-loaded * { animation-play-state: paused !important; }
  </style>
